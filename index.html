<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Essential Behaviours – Match Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.3rem;
      color: #1a2e4a;
      margin-bottom: 6px;
    }

    .instructions {
      text-align: center;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 20px;
    }

    /* ── TOPICS ROW ── */
    .topics {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topic-card {
      background: #1a2e4a;
      color: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.9rem;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      min-width: 110px;
      max-width: 160px;
      flex: 1;
      transition: transform .15s, box-shadow .15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .topic-card.selected {
      transform: scale(1.05);
      box-shadow: 0 0 0 3px #f7c948;
    }

    /* ── SUBTOPICS GRID ── */
    .subtopics {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sub-card {
      background: #fff;
      border: 2px solid #d0d8e4;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .sub-card .label { flex: 1; }

    .sub-card .badge {
      font-size: 0.72rem;
      font-weight: 700;
      background: #e8edf3;
      color: #1a2e4a;
      border-radius: 20px;
      padding: 3px 9px;
      white-space: nowrap;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sub-card.assigned {
      border-color: #7b9cc4;
      background: #eef3fa;
    }

    /* Results colouring */
    .sub-card.correct  { border-color: #27ae60; background: #eafaf1; }
    .sub-card.wrong    { border-color: #e74c3c; background: #fdf0ef; }
    .sub-card.correct .badge { background: #27ae60; color: #fff; }
    .sub-card.wrong   .badge { background: #e74c3c; color: #fff; }

    /* ── BUTTONS ── */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:active { opacity: .75; }

    #btnCheck  { background: #1a2e4a; color: #fff; }
    #btnReset  { background: #e0e6ee; color: #1a2e4a; }

    /* ── SCORE BANNER ── */
    #scoreBanner {
      display: none;
      text-align: center;
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a2e4a;
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    /* ── LEGEND ── */
    .legend {
      display: none;
      justify-content: center;
      gap: 20px;
      margin-top: 14px;
      font-size: 0.8rem;
      color: #555;
    }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .dot.g { background: #27ae60; }
    .dot.r { background: #e74c3c; }
  </style>
</head>
<body>

<h1>Essential Behaviours</h1>
<p class="instructions">Tap a <strong>main topic</strong>, then tap the <strong>subtopics</strong> that belong to it.<br>Press <strong>Check Answers</strong> when done.</p>

<!-- TOPIC BUTTONS -->
<div class="topics" id="topicsRow"></div>

<!-- SHUFFLED SUBTOPICS -->
<div class="subtopics" id="subList"></div>

<!-- ACTIONS -->
<div class="actions">
  <button id="btnCheck">Check Answers</button>
  <button id="btnReset">Reset</button>
</div>

<div id="scoreBanner"></div>
<div class="legend" id="legend">
  <span><span class="dot g"></span> Correct</span>
  <span><span class="dot r"></span> Incorrect</span>
</div>

<script>
  const DATA = [
    {
      id: 't1',
      label: 'Have Courage',
      subs: [
        'Take risks and be entrepreneurial',
        'Take decisions and have drive',
        'Speak up and challenge',
        'Learn from failures',
        'Be open and curious',
      ]
    },
    {
      id: 't2',
      label: 'Create Impact',
      subs: [
        'Take ownership',
        'Set direction & pursue a common goal',
        'Drive execution and deliver results',
        'Empower and enable',
        'Be persistent and resilient',
      ]
    },
    {
      id: 't3',
      label: 'Actively Collaborate',
      subs: [
        'Take care of health and safety',
        'Act as #teamRWE',
        'Foster diversity and inclusion',
        'Respect others',
        'Seek and provide feedback',
      ]
    }
  ];

  // Build lookup: sub text → correct topic id
  const correctMap = {};
  DATA.forEach(t => t.subs.forEach(s => { correctMap[s] = t.id; }));

  // State
  let selectedTopic = null;   // id of currently selected topic
  let assignments   = {};     // sub text → assigned topic id
  let checked       = false;

  // ── Build topic buttons ──────────────────────────────────────────────────
  const topicsRow = document.getElementById('topicsRow');
  DATA.forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'topic-card';
    btn.textContent = t.label;
    btn.dataset.id = t.id;
    btn.addEventListener('click', () => {
      if (checked) return;
      if (selectedTopic === t.id) {
        selectedTopic = null;
        btn.classList.remove('selected');
      } else {
        // deselect old
        document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
        selectedTopic = t.id;
        btn.classList.add('selected');
      }
    });
    topicsRow.appendChild(btn);
  });

  // ── Build shuffled subtopic cards ────────────────────────────────────────
  const allSubs = DATA.flatMap(t => t.subs);
  // Fisher-Yates shuffle
  for (let i = allSubs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allSubs[i], allSubs[j]] = [allSubs[j], allSubs[i]];
  }

  const subList = document.getElementById('subList');

  allSubs.forEach(sub => {
    const card = document.createElement('div');
    card.className = 'sub-card';
    card.dataset.sub = sub;

    const lbl = document.createElement('span');
    lbl.className = 'label';
    lbl.textContent = sub;

    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = '—';

    card.appendChild(lbl);
    card.appendChild(badge);

    card.addEventListener('click', () => {
      if (checked) return;
      if (!selectedTopic) return;

      const topicLabel = DATA.find(t => t.id === selectedTopic).label;

      if (assignments[sub] === selectedTopic) {
        // toggle off
        delete assignments[sub];
        badge.textContent = '—';
        card.classList.remove('assigned');
      } else {
        assignments[sub] = selectedTopic;
        badge.textContent = topicLabel;
        card.classList.add('assigned');
      }
    });

    subList.appendChild(card);
  });

  // ── Check answers ────────────────────────────────────────────────────────
  document.getElementById('btnCheck').addEventListener('click', () => {
    if (checked) return;
    checked = true;

    let correct = 0;
    document.querySelectorAll('.sub-card').forEach(card => {
      const sub = card.dataset.sub;
      const assigned = assignments[sub];
      const badge = card.querySelector('.badge');

      if (assigned && assigned === correctMap[sub]) {
        card.classList.add('correct');
        correct++;
      } else if (!assigned) {
        // not assigned – mark wrong
        card.classList.add('wrong');
        const correctTopic = DATA.find(t => t.id === correctMap[sub]).label;
        badge.textContent = '→ ' + correctTopic;
        card.classList.remove('assigned');
      } else {
        card.classList.add('wrong');
        const correctTopic = DATA.find(t => t.id === correctMap[sub]).label;
        badge.textContent = '→ ' + correctTopic;
      }
    });

    // Deselect topics
    document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
    selectedTopic = null;

    const total = allSubs.length;
    const banner = document.getElementById('scoreBanner');
    banner.style.display = 'block';
    banner.textContent = `You got ${correct} out of ${total} correct!`;

    const legend = document.getElementById('legend');
    legend.style.display = 'flex';
  });

  // ── Reset ────────────────────────────────────────────────────────────────
  document.getElementById('btnReset').addEventListener('click', () => {
    assignments = {};
    selectedTopic = null;
    checked = false;

    document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.sub-card').forEach(card => {
      card.className = 'sub-card';
      card.querySelector('.badge').textContent = '—';
    });

    document.getElementById('scoreBanner').style.display = 'none';
    document.getElementById('legend').style.display = 'none';
  });
</script>
</body>
</html>
